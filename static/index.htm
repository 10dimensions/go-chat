<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Go Chat</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #messages { height: 400px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
        .message { margin: 5px 0; }
        input { width: 70%; padding: 8px; }
        button { padding: 8px 16px; }
    </style>
</head>
<body>
    <h1>Go Chat (WebSocket)</h1>
    <div id="messages"></div>
    <input type="text" id="username" placeholder="Your username" value="WebUser">
    <input type="text" id="input" placeholder="Type a message..." autofocus>
    <button onclick="sendMessage()">Send</button>

    <script>
        let socket;
        const messages = document.getElementById('messages');
        const input = document.getElementById('input');
        const usernameInput = document.getElementById('username');

        function connect() {
            socket = new WebSocket('ws://localhost:8081/ws');

            socket.onopen = () => {
                addMessage('System', 'Connected to chat server');
                // Send username as first message
                socket.send(usernameInput.value || 'WebUser');
            };

            socket.onmessage = (event) => {
                addMessage('Chat', event.data);
            };

            socket.onclose = () => {
                addMessage('System', 'Disconnected from server');
            };

            socket.onerror = (err) => {
                console.error(err);
                addMessage('System', 'Connection error');
            };
        }

        function addMessage(sender, text) {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<strong>${sender}:</strong> ${text}`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function sendMessage() {
            if (socket && socket.readyState === WebSocket.OPEN && input.value.trim() !== '') {
                socket.send(input.value.trim());
                input.value = '';
            }
        }

        // Send on Enter key
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Auto-connect
        window.onload = connect;
    </script>
</body>
</html>
